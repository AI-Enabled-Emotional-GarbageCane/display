<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 情緒垃圾筒 Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">AI</div>
          <div>
            <p class="eyebrow">EMOTIONAL SMART BIN</p>
            <h1>AI 情緒垃圾筒</h1>
          </div>
        </div>
      </header>

      <main>
        <section class="view active display-view" id="display-view" aria-label="使用者端公告螢幕">
          <div class="display-grid">
            <section class="hero-panel">
              <div class="scan-lines" aria-hidden="true"></div>
              <div class="state-pill" id="state-pill">待機中</div>
              <div class="hero-content">
                <section class="camera-panel" aria-label="即時相機畫面">
                  <div class="camera-frame" id="camera-frame">
                    <img id="camera-snapshot" class="camera-snapshot" alt="L515 RGB 即時畫面" />
                    <video id="camera-video" autoplay playsinline muted></video>
                    <div class="camera-placeholder" id="camera-placeholder">
                      <span class="camera-label">L515 CAMERA</span>
                      <button class="camera-button" type="button" id="camera-toggle">啟動 Live</button>
                      <small id="camera-message">等待 AGX 即時影像串流</small>
                    </div>
                  </div>
                </section>
                <div class="result-area">
                  <p class="status-label">目前判定</p>
                  <h2 id="result-title">等待投入</h2>
                  <p id="result-copy">全程零按鈕，靠近即偵測，投入後自動判定。</p>
                  <div class="confidence-meter" aria-label="AI 信心值">
                    <span>Confidence</span>
                    <div class="meter-track">
                      <div class="meter-fill" id="confidence-fill"></div>
                    </div>
                    <strong id="confidence-value">--</strong>
                  </div>
                </div>
              </div>
            </section>

            <aside class="stats-rail" aria-label="今日統計">
              <div class="metric-card">
                <span class="metric-label">正確投入</span>
                <strong id="accept-count">42</strong>
                <small>今天累積</small>
              </div>
              <div class="metric-card danger">
                <span class="metric-label">被抓到亂丟</span>
                <strong id="reject-count">8</strong>
                <small>需要被教育</small>
              </div>
              <div class="metric-card accent">
                <span class="metric-label">今日正確率</span>
                <strong id="accuracy-rate">--</strong>
                <small>依事件統計</small>
              </div>
              <div class="impact-card">
                <span class="metric-label">海洋回饋</span>
                <img id="impact-image" src="assets/sea-turtle-display.png" alt="海龜在海中游動" />
                <small id="impact-copy">用更醒目的結果提醒分類行為</small>
              </div>
            </aside>
          </div>

          <section class="control-strip" aria-label="Demo 控制">
            <button class="control-button" type="button" data-event="detect">Mock 偵測靠近</button>
            <button class="control-button accept" type="button" data-event="accept">Mock 正確分類</button>
            <button class="control-button reject" type="button" data-event="reject">Mock 錯誤分類</button>
            <button class="control-button warn" type="button" data-event="multi">Mock 一次丟多個</button>
            <button class="control-button low" type="button" data-event="low">Mock 低信心</button>
          </section>

          <section class="recent-events" aria-label="最近犯案紀錄">
            <div class="section-heading">
              <p class="eyebrow">LOCAL JSON LOG</p>
              <h2>最近事件</h2>
            </div>
            <div class="event-list" id="display-events"></div>
          </section>
        </section>

      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
